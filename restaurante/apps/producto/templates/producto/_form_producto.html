<form class="mb-4" method="post" action="{% url 'crear_producto' %}">
    {% csrf_token %}
    <div class="row align-items-end">
        <div class="col-md-4">
            <label for="nombre" class="form-label">Producto</label>
            <input type="text" name="nombre" class="form-control" placeholder="Ej. Plato de comida, refresco x 100ml, etc." required>
        </div>
        <div class="col-md-2">
            <label for="categoria" class="form-label">Categoría</label>
            <select id="categoriaSelect" name="categoria" class="form-select" data-url="{% url 'categorias' %}" required>
                <option value="" selected disabled hidden>Seleccione</option>
                <option value="nueva_categoria">➕ Nueva categoría</option>
                {% for categoria in categorias %}
                    <option value="{{ categoria.id }}">{{ categoria.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2">
            <label for="precio_costo" class="form-label">Costo</label>
            <input type="number" step="0.01" name="precio_costo" class="form-control" placeholder="Bs. 0,00 " required>
        </div>
        <div class="col-md-2">
            <label for="precio_venta" class="form-label">Venta</label>
            <input type="number" step="0.01" name="precio_venta" class="form-control" placeholder="Bs. 0,00 " required>
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-success">
                <i class="fa-solid fa-plus"></i> Agregar
            </button>
        </div>
    </div>
</form>
