{% load static %}
<div class="modal fade" id="modalGastoAdmin" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-sm">

            <!-- HEADER -->
            <div class="modal-header">
                <h5 class="modal-title fw-semibold">
                    <i class="fa-solid fa-file-invoice-dollar text-danger me-2"></i>
                    Registrar gasto administrativo
                </h5>
            </div>

            <!-- FORM -->
            <form method="post" action="{% url 'crear_gasto' %}">
                {% csrf_token %}

                <div class="modal-body">

                    <!-- CATEGORIA -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fa-solid fa-tags"></i> Categoría
                        </label>

                        <select name="categoria" class="form-select" required>
                            <option value="" hidden>Seleccionar categoría</option>
                            {% for value,label in categorias %}
                                <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- MONTO -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fa-solid fa-coins"></i> Monto
                        </label>

                        <input type="number" step="0.01" name="monto" class="form-control" placeholder="Bs 0.00"
                            required>
                    </div>

                    <!-- CONCEPTO -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fa-solid fa-file-lines"></i> Concepto
                        </label>

                        <input type="text" name="concepto" class="form-control" placeholder="Ej. Pago contador"
                            required>
                    </div>

                    <!-- DESCRIPCION -->
                    <div class="mb-3 position-relative">
                        <label class="form-label fw-semibold">
                            <i class="fa-solid fa-align-left"></i> Descripción
                        </label>

                        <textarea id="descripcionAdmin" name="descripcion" class="form-control pe-5" rows="3"
                            maxlength="255"></textarea>

                        <!-- contador dentro -->
                        <small id="contadorDescripcionAdmin" class="text-muted position-absolute"
                            style="bottom:8px; right:10px; font-size:12px;">
                            0 / 255
                        </small>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <button type="submit" class="btn btn-danger">
                        <i class="fa-solid fa-check me-1"></i>
                        Guardar gasto
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<script src="{% static 'js/utils/contador_textarea.js' %}"></script>
