<!-- Modal Editar Producto -->
<div class="modal fade" id="editProductoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <form id="formEditarProducto" method="POST" >
                {% csrf_token %}
                <div class="modal-header bg-info text-dark">
                    <h5 class="modal-title">Editar Producto</h5>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="productoId" name="producto_id">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Nombre</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Categoría</label>
                            <select class="form-control" id="categoria" name="categoria_id" required>
                                {% for cat in categorias %}
                                <option value="{{ cat.id }}">{{ cat.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Precio costo</label>
                            <input type="number" step="0.01" class="form-control" id="precio_costo" name="precio_costo"
                                required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Precio venta</label>
                            <input type="number" step="0.01" class="form-control" id="precio_venta" name="precio_venta"
                                required>
                        </div>
                    </div>
                    
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">
                        <i class="fa-solid fa-xmark"></i> Cancelar</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-floppy-disk"></i> Actualizar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
